# Замените YOUR_GITHUB_USERNAME и имя репозитория после публикации на GitHub.
# Настройте OAuth-приложение GitHub для Decap CMS (см. README.md).

backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/iris-photo
  branch: main
  # Если сайт на Timeweb (не Netlify), для входа в админку нужен OAuth-прокси к GitHub.
  # Раскомментируйте и подставьте URL после деплоя прокси (см. README.md):
  # base_url: https://ваш-oauth-прокси.example.com
  # auth_endpoint: oauth

media_folder: public/uploads
public_folder: /uploads
locale: ru

collections:
  - name: portfolio
    label: Портфолио
    label_singular: Работа
    folder: src/content/portfolio
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Название, name: title, widget: string }
      - { label: Фото, name: image, widget: image, required: true }
      - { label: Порядок, name: order, widget: number, default: 0, value_type: int, min: 0 }
      - { label: Категория, name: category, widget: string, required: false }
      - { label: Описание для SEO (alt), name: alt, widget: string, required: false }
      - { label: Подпись / заметка, name: body, widget: markdown, required: false }

  - name: site
    label: Настройки сайта
    files:
      - label: Контакты и тексты
        name: site
        file: src/data/site.json
        fields:
          - { label: Заголовок сайта (title), name: siteTitle, widget: string }
          - { label: Имя на главной, name: photographerName, widget: string }
          - { label: Слоган, name: tagline, widget: text }
          - { label: О себе, name: about, widget: text }
          - { label: Ссылка Instagram, name: instagramUrl, widget: string }
          - { label: Ссылка Telegram, name: telegramUrl, widget: string }
          - { label: Email, name: email, widget: string }
          - { label: Телефон, name: phone, widget: string }
